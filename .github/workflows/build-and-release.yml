name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v1.0.0)'
        required: false
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (${{ matrix.arch }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [x64, arm64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up build environment for ARM64
        if: matrix.arch == 'arm64'
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/deb http/deb [arch=amd64,i386] http/g' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ubuntu-ports/ $(lsb_release -cs) main universe" | sudo tee -a /etc/apt/sources.list
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            sudo apt-get install -y build-essential cmake pkg-config libfltk1.3-dev:arm64 gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
            export CC=aarch64-linux-gnu-gcc
            export CXX=aarch64-linux-gnu-g++
          else
            sudo apt-get install -y build-essential cmake pkg-config libfltk1.3-dev
          fi
      
      - name: Configure (CMake)
        run: |
          mkdir -p build
          if [ "${{ matrix.arch }}" = "arm64" ]; then
            cd build && cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_C_COMPILER=aarch64-linux-gnu-gcc -DCMAKE_CXX_COMPILER=aarch64-linux-gnu-g++
          else
            cd build && cmake .. -DCMAKE_BUILD_TYPE=Release
          fi
      
      - name: Build
        run: cd build && cmake --build . --config Release -- -j$(nproc)
      
      - name: Create tarball
        run: |
          mkdir -p dist
          if [ -f build/Draftz ]; then cp build/Draftz dist/; fi
          cd dist
          ARCH_NAME="${{ matrix.arch }}"
          [ "$ARCH_NAME" = "x64" ] && ARCH_NAME="x86_64"
          TAR_NAME="Draftz-linux-${ARCH_NAME}-${{ github.ref_name || github.event.inputs.tag || 'untagged' }}.tar.gz"
          tar -czf "${TAR_NAME}" Draftz
          rm Draftz
          cd ..
      
      - name: Create Debian package (x64 only)
        if: matrix.arch == 'x64'
        run: |
          mkdir -p draftz-deb/usr/bin draftz-deb/usr/share/applications draftz-deb/DEBIAN
          if [ -f build/Draftz ]; then cp build/Draftz draftz-deb/usr/bin/; fi
          chmod +x draftz-deb/usr/bin/Draftz
          
          cat > draftz-deb/DEBIAN/control <<EOF
          Package: draftz
          Version: ${{ github.ref_name || github.event.inputs.tag || 'untagged' }}
          Architecture: amd64
          Maintainer: xhaevrithon <xhaevrithon@github.com>
          Description: A simple, lightweight text editor built with C++ and FLTK
          Depends: libfltk1.3 (>= 1.3.0)
          EOF
          
          fakeroot dpkg-deb --build draftz-deb dist/draftz-${{ github.ref_name || github.event.inputs.tag || 'untagged' }}-1_amd64.deb
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}-artifacts
          path: dist/*

  build-macos:
    name: Build macOS (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [x86_64, arm64]
    steps:
      - uses: actions/checkout@v4
      
      - name: Install dependencies
        run: brew install fltk cmake
      
      - name: Configure (CMake)
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=${{ matrix.arch }}
      
      - name: Build
        run: cd build && cmake --build . --config Release -- -j$(sysctl -n hw.ncpu)
      
      - name: Create app bundle
        run: |
          mkdir -p dist
          if [ -f build/Draftz ]; then
            mkdir -p "dist/Draftz.app/Contents/MacOS"
            mkdir -p "dist/Draftz.app/Contents/Resources"
            cp build/Draftz "dist/Draftz.app/Contents/MacOS/"
            
            cat > "dist/Draftz.app/Contents/Info.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Draftz</string>
            <key>CFBundleName</key>
            <string>Draftz</string>
            <key>CFBundleVersion</key>
            <string>1.0</string>
            <key>CFBundleShortVersionString</key>
            <string>1.0</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          EOF
            
            chmod +x "dist/Draftz.app/Contents/MacOS/Draftz"
          fi
      
      - name: Create ZIP
        run: |
          cd dist
          ZIP_NAME="Draftz-macos-${{ matrix.arch }}-${{ github.ref_name || github.event.inputs.tag || 'untagged' }}.zip"
          zip -r "${ZIP_NAME}" Draftz.app
          rm -rf Draftz.app
          cd ..
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}-artifacts
          path: dist/*

  build-windows:
    name: Build Windows (${{ matrix.arch }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - arch: x64
            cmake-arch: x64
            vcpkg-arch: x64-windows
          - arch: x86
            cmake-arch: Win32
            vcpkg-arch: x86-windows
          - arch: arm64
            cmake-arch: ARM64
            vcpkg-arch: arm64-windows
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgGitCommitId: '501db0f17ef6df184fcdbfbe0f87cde2313b6ab1'
      
      - name: Install FLTK with vcpkg
        run: |
          vcpkg integrate install
          vcpkg install fltk:${{ matrix.vcpkg-arch }}
      
      - name: Setup CMake
        uses: lukka/get-cmake@latest
      
      - name: Configure (CMake)
        run: |
          mkdir -p build
          cmake -S . -B build -G "Visual Studio 17 2022" -A ${{ matrix.cmake-arch }} `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="${{ env.VCPKG_ROOT }}\scripts\buildsystems\vcpkg.cmake"
      
      - name: Build
        run: cmake --build build --config Release
      
      - name: Package
        shell: pwsh
        run: |
          mkdir -p dist
          if (Test-Path "build/Release/Draftz.exe") {
            Copy-Item "build/Release/Draftz.exe" "dist/"
          }
          
          $ArchName = "${{ matrix.arch }}"
          $TagName = "${{ github.ref_name || github.event.inputs.tag || 'untagged' }}"
          $ZipName = "Draftz-windows-${ArchName}-${TagName}.zip"
          
          cd dist
          Compress-Archive -Path Draftz.exe -DestinationPath $ZipName
          Remove-Item Draftz.exe
          cd ..
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}-artifacts
          path: dist/*

  create_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
      
      - name: Organize and checksum artifacts
        run: |
          mkdir -p release-assets
          find all-artifacts -type f \( -name "*.tar.gz" -o -name "*.deb" -o -name "*.zip" \) | while read file; do
            cp "$file" release-assets/
          done
          
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          md5sum * > MD5SUMS.txt
          cd ..
          
          ls -lah release-assets/
      
      - name: Create or update GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
