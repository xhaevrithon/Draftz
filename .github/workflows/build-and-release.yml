name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to create release for (e.g., v1.0.0)'
        required: false
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y build-essential cmake pkg-config
      - name: Configure (CMake)
        run: mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cd build && cmake --build . --config Release -- -j$(nproc)
      - name: Package
        run: |
          mkdir -p dist
          # adjust executable path/name if different
          if [ -f build/Draftz ] ; then cp build/Draftz dist/ ; fi
          TAR_NAME="Draftz-linux-$(uname -m)-${{ github.ref_name || github.event.inputs.tag || \"untagged\" }}.tar.gz"
          tar -czf dist/${TAR_NAME} -C dist .
      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: dist/*

  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configure (CMake)
        run: mkdir -p build && cd build && cmake .. -DCMAKE_BUILD_TYPE=Release
      - name: Build
        run: cd build && cmake --build . --config Release -- -j$(sysctl -n hw.ncpu)
      - name: Package
        run: |
          mkdir -p dist
          if [ -f build/Draftz ] ; then cp build/Draftz dist/ ; fi
          ZIP_NAME="Draftz-macos-$(uname -m)-${{ github.ref_name || github.event.inputs.tag || \"untagged\" }}.zip"
          cd dist && zip -r ../${ZIP_NAME} . && cd ..
          mv ${ZIP_NAME} dist/
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mac-artifacts
          path: dist/*

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure CMake & build tools
        run: |
          choco install -y cmake --installargs 'ADD_CMAKE_TO_PATH=System'
          choco install -y ninja
      - name: Configure (CMake)
        shell: bash
        run: |
          mkdir -p build
          cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
      - name: Build
        shell: bash
        run: cmake --build build --config Release -- -j$(nproc)
      - name: Package (zip)
        shell: bash
        run: |
          mkdir -p dist
          if [ -f build/Draftz.exe ] ; then cp build/Draftz.exe dist/ ; fi
          ZIP_NAME="Draftz-windows-${{ runner.arch }}-${{ github.ref_name || github.event.inputs.tag || 'untagged' }}.zip"
          cd dist && zip -r ../${ZIP_NAME} . && cd ..
          mv ${ZIP_NAME} dist/
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: dist/*

  create_release:
    name: Create GitHub Release and upload assets
    runs-on: ubuntu-latest
    needs: [build-linux, build-macos, build-windows]
    env:
      TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: dist
      - name: Download macOS artifacts
        uses: actions/download-artifact@v4
        with:
          name: mac-artifacts
          path: dist
      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: dist
      - name: List dist
        run: ls -la dist || true
      - name: Create or update GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
